stages:
  - build
  - security
  - push
  - deploy

variables:
  AWS_REGION: "eu-west-2"
  AWS_ACCOUNT_ID: "942909610648"
  EKS_CLUSTER_NAME: "financial-devsecops"
  IMAGE_NAME: "financial-api"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# --------------------
# BUILD
# --------------------
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG app/

# --------------------
# SECURITY
# --------------------
security_scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy config .

# --------------------
# PUSH TO ECR
# --------------------
push_ecr:
  stage: push
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl unzip
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip awscliv2.zip
    - ./aws/install
    - aws --version
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG app/
    - docker tag $IMAGE_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG

# --------------------
# DEPLOY TO EKS
# --------------------
deploy:
  stage: deploy
  image: amazon/aws-cli:latest
  before_script:
    - curl -LO https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
  script:
    - aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
    - aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
    - aws configure set default.region $AWS_REGION
    - aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
    - kubectl set image deployment/financial-api financial-api=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG
    - kubectl rollout status deployment/financial-api
