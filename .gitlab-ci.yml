stages:
  - build
  - security

variables:
  IMAGE_NAME: "financial-api"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  DOCKER_TLS_CERTDIR: ""

build:
  stage: build

  image: docker:24

  services:
    - docker:24-dind

  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG app/


security_scan:

  stage: security

  image: docker:24

  services:
    - docker:24-dind

  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG app/
    - ./bin/trivy image --severity HIGH,CRITICAL $IMAGE_NAME:$IMAGE_TAG
